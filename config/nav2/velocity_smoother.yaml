# https://docs.nav2.org/configuration/packages/configuring-velocity-smoother.html
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 10.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.4, 0.0, 0.6981317007977318]
    min_velocity: [-0.4, 0.0, -0.6981317007977318]
    max_accel: [0.8, 0.0, 3.141592653589793]
    max_decel: [-0.8, 0.0, -3.141592653589793]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    enable_stamped_cmd_vel: false
