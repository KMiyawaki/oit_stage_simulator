velocity_smoother:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: false
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [ 0.8, 0.0, 1.5707963267948966 ] # python -c "import math; print(math.radians(90))"
    min_velocity: [ -0.8, 0.0, -1.5707963267948966 ] # python -c "import math; print(math.radians(200))"
    max_accel: [ 1.5, 0.0, 3.490658503988659 ]
    max_decel: [ -1.5, 0.0, -3.490658503988659 ]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [ 0.0, 0.0, 0.0 ]
    velocity_timeout: 1.0
