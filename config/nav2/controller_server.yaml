# https://docs.nav2.org/configuration/packages/configuring-controller-server.html
# https://github.com/ros-navigation/navigation2/issues/2828
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    controller_plugins: ["FollowPath"]
    progress_checker_plugin: “progress_checker” # For Humble and older, Jazzy is also included.
    current_progress_checker: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    current_goal_checker: "goal_checker"
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.017453292519943295 # python -c "import math; print(math.radians(1.0))"
    failure_tolerance: 0.5
    odom_topic: "odom"
    enable_stamped_cmd_vel: false
    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 15.0
    # Goal checker parameters
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.349 # python -c "import math; print(math.radians(20))"
      stateful: true
    # DWB parameters
    # https://docs.nav2.org/configuration/packages/dwb-params/controller.html
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      # https://docs.nav2.org/configuration/packages/dwb-params/kinematic.html
      max_vel_theta: 1.0471975511965976 # python -c "import math; print(math.radians(60))"
      min_speed_xy: 0.05
      max_speed_xy: 0.6
      min_speed_theta: 0.04363323129985824 # python -c "import math; print(math.radians(2.5))"
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.6
      max_vel_y: 0.0
      acc_lim_x: 1.2
      acc_lim_y: 0.0
      acc_lim_theta: 3.141592653589793
      decel_lim_x: -1.2
      decel_lim_y: 0.0
      decel_lim_theta: -3.141592653589793
      # 
      critics:
        [
          # "RotateToGoal",
          "Oscillation",
          "ObstacleFootprint", 
          "BaseObstacle",
          "GoalAlign",
          "PathAlign",
          "PathDist",
          "GoalDist",
        ]
      prune_plan: true
      debug_trajectory_details: True
      transform_tolerance: 5.0
      short_circuit_trajectory_evaluation: True
      
      # !IMPORTANT
      PathAlign.scale: 24.0
      GoalAlign.scale: 6.0
      PathDist.scale: 32.0
      GoalDist.scale: 18.0
      BaseObstacle.scale: 0.5
      ObstacleFootprint.scale: 0.01
      ObstacleFootprint.max_scaling_factor: 0.2
      ObstacleFootprint.scaling_speed: 0.25
      # IMPORTANT!
      # PathAlign.forward_point_distance: 0.05
      # GoalAlign.forward_point_distance: 0.05
      # RotateToGoal.scale: 32.0
      # RotateToGoal.slowing_factor: 5.0
      # RotateToGoal.lookahead_time: -1.0
      Oscillation.oscillation_reset_dist: 0.10
      Oscillation.oscillation_reset_angle: 0.2617993877991494 # python -c "import math; print(math.radians(15))"
      Oscillation.oscillation_reset_time: 1.0
      Oscillation.x_only_threshold: 0.1
      Oscillation.scale: 0.2
      # https://docs.nav2.org/configuration/packages/dwb-plugins/standard_traj_generator.html
      sim_time: 1.7
      linear_granularity: 0.125
      angular_granularity: 0.017453292519943295 # python -c "import math; print(math.radians(1))"
      # https://docs.nav2.org/configuration/packages/dwb-params/iterator.html
      vx_samples: 7
      vy_samples: 0
      vtheta_samples: 5 # !IMPORTANT

local_costmap:
  local_costmap:
    ros__parameters:
      transform_tolerance: 5.0
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      update_frequency: 5.0
      publish_frequency: 1.0
      static_map: false
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.1
      footprint: "[[0.045, 0.1125], [0.045, -0.1125], [-0.18, -0.1125], [-0.18, 0.1125]]"
      footprint_padding: 0.06
      # robot_radius: 0.23
      always_send_full_costmap: true
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        combination_method: 1
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.25
        cost_scaling_factor: 10.0
