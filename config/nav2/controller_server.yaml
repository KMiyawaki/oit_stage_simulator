# https://docs.nav2.org/configuration/packages/configuring-controller-server.html
# https://github.com/ros-navigation/navigation2/blob/humble/nav2_bringup/params/nav2_params.yaml
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.017453292519943295 # python -c "import math; print(math.radians(1))"
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: [ "general_goal_checker" ] # "precise_goal_checker"
    controller_plugins: [ "FollowPath" ]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 10.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      # ! CHECK FollowPath tolerance
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.3490658503988659 # python -c "import math; print(math.radians(20))"
    # DWB parameters
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: -0.1
      min_vel_y: 0.0
      max_vel_x: 0.6
      max_vel_y: 0.0
      max_vel_theta: 1.0471975511965976 # python -c "import math; print(math.radians(60))"
      min_speed_xy: 0.05
      max_speed_xy: 0.6
      min_speed_theta: 0.04363323129985824 # python -c "import math; print(math.radians(2.5))"
      acc_lim_x: 1.2
      acc_lim_y: 0.0
      acc_lim_theta: 3.141592653589793
      decel_lim_x: -1.2
      decel_lim_y: 0.0
      decel_lim_theta: -3.141592653589793
      vx_samples: 10
      vy_samples: 0
      vtheta_samples: 15
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.04363323129985824 # python -c "import math; print(math.radians(2.5))"
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.15
      trans_stopped_velocity: 0.01
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics:
        [
          "RotateToGoal",
          "Oscillation",
          "ObstacleFootprint", 
          "BaseObstacle",
          "GoalAlign",
          "PathAlign",
          "PathDist",
          "GoalDist",
        ]
      BaseObstacle.scale: 10.0
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.05
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 12.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
      ObstacleFootprint.scale: 1.0
      ObstacleFootprint.max_scaling_factor: 0.1
      ObstacleFootprint.scaling_speed: 0.25
      Oscillation.oscillation_reset_dist: 0.10
      Oscillation.oscillation_reset_angle: 0.5235987755982988 # python -c "import math; print(math.radians(30))"
      Oscillation.oscillation_reset_time: 1.5
      Oscillation.x_only_threshold: 0.1
      Oscillation.scale: 1.0

local_costmap:
  local_costmap:
    ros__parameters:
      transform_tolerance: 5.0
      use_sim_time: true
      enable_stamped_cmd_vel: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.1
      footprint: "[[0.045, 0.1125], [0.045, -0.1125], [-0.18, -0.1125], [-0.18, 0.1125]]"
      footprint_padding: 0.05
      plugins: [ "obstacle_layer", "inflation_layer" ]
      obstacle_layer:
        combination_method: 1
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.20
      always_send_full_costmap: true
